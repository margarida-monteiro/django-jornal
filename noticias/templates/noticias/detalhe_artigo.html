<!DOCTYPE html>
{% load static %}
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ artigo.titulo }}</title>
    <link rel="stylesheet" href="{% static 'noticias/style.css' %}">
</head>
<body>
    <div class="container">
        <header>
            <h1>{{ artigo.titulo }}</h1>
        </header>

        <article>
            <p>{{ artigo.corpo|linebreaks }}</p>
            <p><a href="{% url 'comentarios_artigo' artigo.id %}">Ver / Escrever Comentários</a></p>
        </article>

        <a class="back-link" href="/">← Voltar à lista</a>
    </div>
</body>
</html>
